<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note Page</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    textarea {
      min-height: 220px;
      resize: vertical;
    }
    button {
      background: #2d7ef7;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #1d68d8;
    }
    .notes-box {
      margin-top: 25px;
      padding: 15px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .tag {
      display: inline-block;
      background: #e8f0ff;
      color: #2d5fb8;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 14px;
      margin-right: 8px;
    }
    #saved-notes-container {
      margin-top: 30px;
      border-top: 2px solid #eee;
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Notes</h1>
    <p>Website for writing notes.</p>

    <label for="title">Title</label>
    <input type="text" id="title" placeholder="Enter note title">

    <label for="note">Note</label>
    <textarea id="note" placeholder="Write your note here..."></textarea>

    <button onclick="saveNote()">Save Note</button>

    <div id="saved-notes-container">
        <h2>Saved Notes</h2>
        <div id="notes-list">
            </div>
    </div>
  </div>

  <script>
    // Load notes when the page loads
    window.onload = function() {
        loadNotes();
    };

    async function saveNote() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('note').value;

        if(!title || !content) {
            alert("Please fill in both title and note content.");
            return;
        }

        const requestData = { title: title, content: content };

        const response = await fetch('/api/notes', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(requestData)
        });

        if(response.ok) {
            // Clear inputs and reload the list
            document.getElementById('title').value = '';
            document.getElementById('note').value = '';
            loadNotes();
        }
    }

    async function loadNotes() {
        const response = await fetch('/api/notes');
        const notes = await response.json();
        
        const notesList = document.getElementById('notes-list');
        notesList.innerHTML = ''; // Clear current list

        // Render each note using the provided CSS classes
        notes.forEach(note => {
            const noteDiv = document.createElement('div');
            noteDiv.className = 'notes-box';
            noteDiv.innerHTML = `
                <p><strong>${note.title}</strong></p>
                <p>${note.content}</p>
                <span class="tag">Saved</span>
            `;
            notesList.appendChild(noteDiv);
        });
    }
  </script>
</body>
</html>
