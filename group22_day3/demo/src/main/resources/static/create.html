<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note Page</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    textarea {
      min-height: 220px;
      resize: vertical;
    }
    button {
      background: #2d7ef7;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #1d68d8;
    }
    .notes-box {
      margin-top: 25px;
      padding: 15px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .tag {
      display: inline-block;
      background: #e8f0ff;
      color: #2d5fb8;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 14px;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div style="background:#2d7ef7; padding:10px;">
  <div class="container text-center">
    
    <a href="index.html" class="btn btn-outline-light mx-2" style="text-decoration:none;"> Back to NotesList </a>
  </div>
</div>


  <div class="container">
    <h1>My Notes</h1>
    <p>Website for writing notes.</p>

    <label for="title">Title</label>
    <input type="text" id="title" placeholder="Enter note title">

    <label for="content">Note</label>
    <textarea id="content" placeholder="Write your note here..."></textarea>

    <button onclick="save()">Save Note</button>

    <div class="notes-box">
      <h2>Preview</h2>
      <p><strong>Sample Note Title</strong></p>
      <p>This area can show your saved note or a preview of your writing.</p>
      <span class="tag">Study</span>
      <span class="tag">Important</span>
    </div>
  </div>
</body>


<script>
async function save() {
  let title = document.getElementById('title').value;
  let content = document.getElementById('content').value;

  await fetch('/notes', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ title, content })
  });

  alert("Saved!");
  window.location.href = "index.html"
}

</script>
</html>
